services:
  - type: web
    name: fraudguard-app
    runtime: python
    region: oregon
    plan: free
    rootDir: streamlit
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
